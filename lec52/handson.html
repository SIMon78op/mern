<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Math Quiz Game</title>
  <link rel="stylesheet" href="handson.css">
</head>
<body>

<div class="container">
  <h1>🧠 Math Quiz</h1>

  <div class="settings">
    <select id="difficulty">
      <option value="easy">Easy</option>
      <option value="medium" selected>Medium</option>
      <option value="hard">Hard</option>
    </select>

    <div class="ops">
      <label><input type="checkbox" class="operator" value="+" checked>+</label>
      <label><input type="checkbox" class="operator" value="-" checked>-</label>
      <label><input type="checkbox" class="operator" value="*" checked>*</label>
      <label><input type="checkbox" class="operator" value="/" checked>/</label>
    </div>

    <button onclick="startGame()">Start Game</button>
  </div>

  <div id="game" class="game" style="display:none;">
    <div class="top">
      <span>Score: <b id="score">0</b></span>
      <span>Q: <b id="questionNum">1</b>/10</span>
      <span>⏱ <b id="timer">60</b>s</span>
    </div>

    <div id="questionText" class="question"></div>

    <input id="answerInput" type="number" placeholder="Your answer">
    <div id="feedback" class="feedback"></div>
  </div>
</div>

<script src="handson.js"></script>
</body>
</html>
